// === 渲染 ===

// === 更新标识 ===
function isNew(t){
  if(!t.updated)return false;
  const d=new Date(t.updated),now=new Date();
  return (now-d)/(1000*60*60*24)<7;
}
function updatedBadge(t){
  if(!t.updated)return '';
  return '<span class="term-updated"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>'+t.updated+'</span>';
}
function render(){
  const nav=document.getElementById("navList");
  const ct=document.getElementById("content");
  let navH="",ctH="";
  DATA.forEach(sec=>{sec.terms.sort(function(a,b){return(b.stars||0)-(a.stars||0);});
    navH+='<div class="nav-group"><div class="nav-group-title" onclick="navScrollTo(\'sec-'+sec.id+'\')">'+sec.num+' '+sec.title+'</div>';
    sec.terms.forEach((t,i)=>{
      navH+='<div class="nav-item" data-target="'+sec.id+"-"+i+'" onclick="navScrollTo(\''+sec.id+"-"+i+'\')">'+t.name+(isNew(t)?'<span class="nav-new">NEW</span>':'')+'</div>';
    });
    navH+="</div>";
    ctH+='<div class="section" id="sec-'+sec.id+'"><div class="section-head"><h3>'+sec.icon+'<span class="num">'+sec.num+'</span>'+sec.title+'</h3><p>'+sec.desc+'</p></div><div class="term-grid">';
    sec.terms.forEach((t,i)=>{
      var starsH='<span class="stars">';for(var s=0;s<5;s++){starsH+='<svg class="star '+(s<t.stars?'active':'')+'" viewBox="0 0 24 24"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>';}starsH+='</span>';
      var booksH='';if(t.books&&t.books.length){booksH='<div class="book-refs"><div class="book-refs-title"><svg viewBox="0 0 24 24"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>经典著作</div>';t.books.forEach(function(b){booksH+='<div class="book-ref"><svg class="book-icon" viewBox="0 0 24 24"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg><div><a href="'+b.url+'" target="_blank" rel="noopener">'+b.title+'</a> <span class="book-meta">— '+b.author+'</span>'+(b.quote?'<div class="book-quote">\u201c'+b.quote+'\u201d</div>':'')+'</div></div>';});booksH+='</div>';}
      ctH+='<div class="term-card" id="'+sec.id+"-"+i+'"><div class="term-header" onclick="toggleCard(this)"><h4>'+t.name+' <span class="en">'+t.en+'</span>'+starsH+updatedBadge(t)+'</h4><span class="arrow"><svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg></span></div><div class="term-body"><div class="term-desc">'+t.desc+'</div>'+(t.quotes&&t.quotes.length?'<div class="quotes-box"><svg class="quotes-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>'+t.quotes.map(function(q){return '<div class="quote-line">'+q+'</div>';}).join('')+'</div>':'')+(DG[t.name]||'')+'<div class="demo-box"><span class="demo-label">EXAMPLE</span>'+t.demo+'</div>'+booksH+'</div></div>';
    });
    ctH+="</div></div>";
  });
  nav.innerHTML=navH;
  ct.innerHTML=ctH;
}
function toggleCard(el){el.parentElement.classList.toggle("open")}

function navScrollTo(id){
  const el=document.getElementById(id);
  if(!el) return;
  el.classList.add("open");
  const top=el.getBoundingClientRect().top+window.pageYOffset-72;
  window.scrollTo({top:top,behavior:"smooth"});
  el.style.boxShadow="0 0 0 2px var(--accent)";
  setTimeout(()=>{el.style.boxShadow=""},1200);
}

function filterTerms(v){
  const q=v.toLowerCase();
  document.querySelectorAll(".term-card").forEach(c=>{
    const t=c.textContent.toLowerCase();
    c.style.display=t.includes(q)?"":"none";
  });
  document.querySelectorAll(".nav-item").forEach(n=>{
    const t=n.textContent.toLowerCase();
    n.style.display=t.includes(q)?"":"none";
  });
  document.querySelectorAll(".nav-group").forEach(g=>{
    const visible=g.querySelectorAll(".nav-item[style=''],.nav-item:not([style])");
    g.style.display=visible.length?"":"none";
  });
}

// 滚动高亮
let ticking=false;
window.addEventListener("scroll",function(){
  if(!ticking){
    window.requestAnimationFrame(function(){
      const cards=document.querySelectorAll(".term-card");
      let currentId="";
      for(let i=0;i<cards.length;i++){
        const rect=cards[i].getBoundingClientRect();
        if(rect.top<=120) currentId=cards[i].id;
      }
      const navItems=document.querySelectorAll(".nav-item");
      navItems.forEach(n=>{
        const isActive=n.getAttribute("data-target")===currentId;
        n.classList.toggle("active",isActive);
        if(isActive){
          const sidebar=document.getElementById("sidebar");
          const navRect=n.getBoundingClientRect();
          const sideRect=sidebar.getBoundingClientRect();
          if(navRect.top<sideRect.top+60||navRect.bottom>sideRect.bottom-20){
            n.scrollIntoView({block:"center",behavior:"smooth"});
          }
        }
      });
      ticking=false;
    });
    ticking=true;
  }
});

render();
document.querySelectorAll(".term-card").forEach(c=>c.classList.add("open"));
</script>
