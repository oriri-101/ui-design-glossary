<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>UI 设计专业词库</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#f8f7f4;--card:#fff;--text:#1a1a1a;--sub:#666;--border:#e8e5e0;--accent:#c45c3e;--accent2:#2d6a4f;--tag-bg:#f0ede8;--hover:#faf8f5;--shadow:0 1px 3px rgba(0,0,0,.06);--code-bg:#f5f3ef;--nav-bg:rgba(248,247,244,.92)}
[data-theme="dark"]{--bg:#141413;--card:#1e1e1c;--text:#e8e5e0;--sub:#999;--border:#2e2e2a;--accent:#e07a5f;--accent2:#52b788;--tag-bg:#2a2a26;--hover:#252522;--shadow:0 1px 3px rgba(0,0,0,.3);--code-bg:#252522;--nav-bg:rgba(20,20,19,.92)}
body{font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Helvetica Neue","Noto Sans SC",sans-serif;background:var(--bg);color:var(--text);line-height:1.7;transition:background .3s,color .3s}
a{color:var(--accent);text-decoration:none}

/* 顶部导航 */
.top-bar{position:fixed;top:0;left:0;right:0;z-index:100;background:var(--nav-bg);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);height:56px;display:flex;align-items:center;padding:0 24px;justify-content:space-between}
.top-bar h1{font-size:15px;font-weight:600;letter-spacing:.5px}
.top-bar h1 span{color:var(--accent);margin-right:6px}
.theme-btn{width:36px;height:36px;border-radius:8px;border:1px solid var(--border);background:var(--card);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;transition:all .2s}
.theme-btn:hover{border-color:var(--accent)}

/* 侧边导航 */
.sidebar{position:fixed;top:56px;left:0;bottom:0;width:240px;background:var(--card);border-right:1px solid var(--border);overflow-y:auto;padding:16px 0;z-index:50}
.sidebar::-webkit-scrollbar{width:3px}
.sidebar::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
.nav-group{margin-bottom:8px}
.nav-group-title{padding:8px 20px;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:1.5px;color:var(--sub)}
.nav-item{display:block;padding:7px 20px 7px 28px;font-size:13px;color:var(--sub);cursor:pointer;transition:all .15s;border-left:2px solid transparent}
.nav-item:hover{color:var(--text);background:var(--hover)}
.nav-item.active{color:var(--accent);border-left-color:var(--accent);background:var(--hover);font-weight:500}

/* 主内容区 */
.main{margin-left:240px;padding:80px 48px 80px;max-width:960px}
.hero{margin-bottom:56px;padding-bottom:40px;border-bottom:1px solid var(--border)}
.hero h2{font-size:32px;font-weight:700;line-height:1.3;margin-bottom:12px}
.hero p{font-size:15px;color:var(--sub);max-width:600px}
.hero .tag-row{display:flex;gap:8px;margin-top:16px;flex-wrap:wrap}
.hero .tag{font-size:11px;padding:4px 10px;border-radius:4px;background:var(--tag-bg);color:var(--sub);font-weight:500}

/* 章节 */
.section{margin-bottom:64px}
.section-head{margin-bottom:32px}
.section-head h3{font-size:22px;font-weight:700;margin-bottom:6px;display:flex;align-items:center;gap:10px}
.section-head h3 .num{font-size:13px;color:var(--accent);font-weight:600;min-width:24px}
.section-head p{font-size:13px;color:var(--sub)}

/* 术语卡片 */
.term-grid{display:grid;grid-template-columns:1fr;gap:16px}
.term-card{background:var(--card);border:1px solid var(--border);border-radius:10px;overflow:hidden;transition:all .2s}
.term-card:hover{box-shadow:var(--shadow);border-color:var(--accent)}
.term-header{padding:16px 20px;cursor:pointer;display:flex;align-items:center;justify-content:space-between}
.term-header h4{font-size:15px;font-weight:600;display:flex;align-items:center;gap:8px}
.term-header h4 .en{font-size:12px;color:var(--sub);font-weight:400}
.term-header .arrow{font-size:12px;color:var(--sub);transition:transform .2s}
.term-card.open .arrow{transform:rotate(90deg)}
.term-body{display:none;padding:0 20px 20px;animation:fadeIn .25s}
.term-card.open .term-body{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:none}}
.term-desc{font-size:13px;color:var(--sub);margin-bottom:16px;line-height:1.8}

/* 案例展示区 */
.demo-box{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:20px;position:relative;min-height:80px;overflow:hidden}
.demo-label{position:absolute;top:8px;right:10px;font-size:10px;color:var(--sub);letter-spacing:.5px;font-weight:500}

/* 通用 demo 样式 */
.demo-row{display:flex;gap:12px;align-items:center;flex-wrap:wrap}
.demo-col{display:flex;flex-direction:column;gap:8px;align-items:center}
.demo-block{border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:11px;color:#fff;font-weight:500}
.demo-text{font-size:11px;color:var(--sub);text-align:center;margin-top:4px}

/* 按钮 demo */
.demo-btn{padding:8px 20px;border-radius:6px;font-size:13px;font-weight:500;border:none;cursor:pointer;transition:all .15s}
.demo-btn.primary{background:var(--accent);color:#fff}
.demo-btn.secondary{background:transparent;border:1px solid var(--border);color:var(--text)}
.demo-btn.text{background:transparent;color:var(--accent);text-decoration:underline}
.demo-btn:disabled{opacity:.4;cursor:not-allowed}

/* 输入框 demo */
.demo-input{padding:8px 12px;border-radius:6px;border:1px solid var(--border);background:var(--card);color:var(--text);font-size:13px;outline:none;transition:border .15s;width:180px}
.demo-input:focus{border-color:var(--accent)}

/* 开关 demo */
.demo-switch{width:40px;height:22px;border-radius:11px;background:var(--border);position:relative;cursor:pointer;transition:background .2s}
.demo-switch.on{background:var(--accent2)}
.demo-switch::after{content:"";position:absolute;top:2px;left:2px;width:18px;height:18px;border-radius:50%;background:#fff;transition:transform .2s;box-shadow:0 1px 2px rgba(0,0,0,.15)}
.demo-switch.on::after{transform:translateX(18px)}

/* 卡片 demo */
.demo-card{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:16px;width:200px}
.demo-card .img{height:80px;background:var(--tag-bg);border-radius:4px;margin-bottom:10px}
.demo-card .title{font-size:13px;font-weight:600;margin-bottom:4px}
.demo-card .sub{font-size:11px;color:var(--sub)}

/* Badge & Tag demo */
.demo-badge{display:inline-flex;align-items:center;position:relative;padding:4px 8px}
.demo-badge .dot{width:8px;height:8px;border-radius:50%;background:var(--accent);position:absolute;top:-2px;right:-2px}
.demo-tag{padding:3px 10px;border-radius:4px;font-size:11px;font-weight:500}

/* Skeleton demo */
.skel{background:linear-gradient(90deg,var(--tag-bg) 25%,var(--border) 50%,var(--tag-bg) 75%);background-size:200% 100%;animation:skel 1.5s infinite;border-radius:4px}
@keyframes skel{0%{background-position:200% 0}100%{background-position:-200% 0}}

/* Toast demo */
.demo-toast{padding:10px 16px;border-radius:6px;font-size:12px;font-weight:500;display:inline-flex;align-items:center;gap:6px}

/* Progress demo */
.demo-progress{height:6px;background:var(--tag-bg);border-radius:3px;overflow:hidden;width:200px}
.demo-progress .bar{height:100%;border-radius:3px;transition:width .6s}

/* 色板 demo */
.color-swatch{width:48px;height:48px;border-radius:6px;border:1px solid var(--border)}

/* 圆角 demo */
.radius-demo{width:56px;height:56px;background:var(--accent);opacity:.8}

/* 阴影 demo */
.shadow-demo{width:80px;height:56px;background:var(--card);border-radius:8px}

/* 字重 demo */
.weight-demo{font-size:16px;color:var(--text)}

/* 状态 demo */
.state-dot{width:10px;height:10px;border-radius:50%;display:inline-block}

/* 动效 demo */
.anim-box{width:40px;height:40px;background:var(--accent);border-radius:6px;cursor:pointer}
.anim-box:hover{transform:scale(1.15)}
.anim-ease{transition:transform .4s cubic-bezier(.4,0,.2,1)}
.anim-spring{transition:transform .5s cubic-bezier(.175,.885,.32,1.275)}
.anim-box.rotate:hover{transform:rotate(90deg)}

/* 布局 demo */
.layout-box{display:flex;gap:4px}
.layout-col{background:var(--accent);opacity:.6;border-radius:3px;height:48px}
.layout-sidebar-demo{display:flex;gap:4px;width:240px;height:80px}
.layout-sidebar-demo .side{width:60px;background:var(--accent2);opacity:.5;border-radius:3px}
.layout-sidebar-demo .content{flex:1;background:var(--tag-bg);border-radius:3px}

/* Glassmorphism demo */
.glass-demo{backdrop-filter:blur(10px);background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.2);border-radius:10px;padding:16px;color:#fff;font-size:12px;position:relative}
.glass-bg{background:linear-gradient(135deg,#667eea,#764ba2);border-radius:10px;padding:24px}

/* Neumorphism demo */
.neu-demo{border-radius:12px;padding:20px;text-align:center;font-size:12px}
[data-theme="dark"] .neu-demo{background:#1e1e1c;box-shadow:5px 5px 10px #111,inset -5px -5px 10px #2a2a28}
:root .neu-demo{background:#e8e5e0;box-shadow:5px 5px 10px #d1cec9,inset -5px -5px 10px #fff}

/* 代码块 */
.code-block{background:var(--code-bg);border-radius:6px;padding:12px 16px;font-family:"SF Mono",Menlo,monospace;font-size:12px;color:var(--sub);overflow-x:auto;margin-top:12px}

/* 搜索 */
.search-wrap{padding:0 20px;margin-bottom:12px}
.search-input{width:100%;padding:8px 12px;border-radius:6px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-size:13px;outline:none}
.search-input:focus{border-color:var(--accent)}

/* Responsive */
@media(max-width:768px){
  .sidebar{display:none}
  .main{margin-left:0;padding:72px 20px 60px}
  .hero h2{font-size:24px}
  .term-grid{grid-template-columns:1fr}
}
</style>
</head>
<body>

<div class="top-bar">
  <h1><span>/</span>UI Design Glossary</h1>
  <button class="theme-btn" onclick="toggleTheme()" id="themeBtn">&#9790;</button>
</div>

<aside class="sidebar" id="sidebar">
  <div class="search-wrap">
    <input class="search-input" placeholder="搜索术语..." oninput="filterTerms(this.value)" />
  </div>
  <div id="navList"></div>
</aside>

<main class="main" id="mainContent">
  <div class="hero">
    <h2>UI 设计专业词库</h2>
    <p>AI 精准校准专用 — 涵盖设计风格、布局、组件、视觉、交互、Prompt 指令六大领域，每个术语配可交互形态案例。</p>
    <div class="tag-row">
      <span class="tag">6 大章节</span>
      <span class="tag">100+ 术语</span>
      <span class="tag">可交互案例</span>
      <span class="tag">深色模式</span>
    </div>
  </div>
  <div id="content"></div>
</main>

<script>
// === 主题切换 ===
function toggleTheme(){
  const d=document.documentElement;
  const t=d.getAttribute("data-theme")==="dark"?"light":"dark";
  d.setAttribute("data-theme",t);
  document.getElementById("themeBtn").innerHTML=t==="dark"?"&#9788;":"&#9790;";
  localStorage.setItem("theme",t);
}
(function(){const t=localStorage.getItem("theme")||"light";document.documentElement.setAttribute("data-theme",t);if(t==="dark")document.getElementById("themeBtn").innerHTML="&#9788;"})();

// === 数据 ===
const DATA=[
// ========== 第1章 设计风格 ==========
{
  id:"style",title:"设计风格体系",num:"01",
  desc:"定义整体基调与视觉方向。从大厂设计系统到主流视觉风格，决定产品的第一印象。",
  terms:[
    {name:"iOS HIG",en:"Human Interface Guidelines",desc:"Apple 官方设计规范。强调清晰性、遵从性、深度感。大量使用 SF Pro 字体、毛玻璃效果、圆角卡片。",
     demo:'<div class="glass-bg" style="display:flex;gap:12px;align-items:center"><div class="glass-demo">毛玻璃效果</div><div style="font-size:11px;color:rgba(255,255,255,.7)">iOS 标志性视觉</div></div>'},
    {name:"Material Design 3",en:"MD3 / Material You",desc:"Google 的设计系统。强调动态色彩（Dynamic Color）、大圆角、高对比度容器。",
     demo:'<div class="demo-row"><div class="demo-block" style="width:80px;height:48px;border-radius:16px;background:#6750a4">Primary</div><div class="demo-block" style="width:80px;height:48px;border-radius:16px;background:#625b71">Secondary</div><div class="demo-block" style="width:80px;height:48px;border-radius:16px;background:#7d5260">Tertiary</div></div>'},
    {name:"极简主义",en:"Minimalism",desc:"最少元素、最大留白。去除一切装饰性元素，只保留核心信息与交互。",
     demo:'<div style="padding:20px;text-align:center"><div style="font-size:20px;font-weight:700;margin-bottom:8px">Hello.</div><div style="font-size:12px;color:var(--sub)">Less is more.</div></div>'},
    {name:"扁平化 2.0",en:"Flat Design 2.0",desc:"在纯扁平基础上加入微妙阴影和层次感，保持简洁同时提升可用性。",
     demo:'<div class="demo-row"><div style="width:64px;height:64px;background:var(--accent);border-radius:12px;box-shadow:0 2px 8px rgba(196,92,62,.25)"></div><div style="width:64px;height:64px;background:var(--accent2);border-radius:12px;box-shadow:0 2px 8px rgba(45,106,79,.25)"></div><div style="width:64px;height:64px;background:#4a7fb5;border-radius:12px;box-shadow:0 2px 8px rgba(74,127,181,.25)"></div></div>'},
    {name:"玻璃拟态",en:"Glassmorphism",desc:"半透明背景 + 高斯模糊 + 细微边框，营造如玻璃般的深度感与层次感。",
     demo:'<div class="glass-bg"><div class="glass-demo">backdrop-filter: blur(10px)<br>background: rgba(255,255,255,0.15)</div></div>'},
    {name:"新拟态",en:"Neumorphism",desc:"通过凸起/凹陷的柔和阴影模拟实物触感。适合开关、旋钮等小组件。",
     demo:'<div class="neu-demo">Neumorphism<br><span style="font-size:10px;color:var(--sub)">柔和凸起效果</span></div>'},
    {name:"酸性设计",en:"Acid Design",desc:"高饱和度、变形字体、金属质感、液态形态。常见于音乐、潮牌、先锋设计。",
     demo:'<div style="background:linear-gradient(135deg,#ff006e,#8338ec,#3a86ff);padding:20px;border-radius:8px;text-align:center"><span style="color:#fff;font-size:18px;font-weight:900;font-style:italic;letter-spacing:2px">ACID</span><div style="color:rgba(255,255,255,.6);font-size:10px;margin-top:4px">高饱和 / 变形 / 液态</div></div>'},
    {name:"赛博朋克",en:"Cyberpunk",desc:"霓虹光效、深色背景、故障纹理、科幻感强烈。常用于游戏和科技产品。",
     demo:'<div style="background:#0a0a1a;padding:20px;border-radius:8px;text-align:center;border:1px solid #00fff5"><span style="color:#00fff5;font-size:16px;font-weight:700;text-shadow:0 0 10px #00fff5">CYBER</span><span style="color:#ff2a6d;font-size:16px;font-weight:700;text-shadow:0 0 10px #ff2a6d;margin-left:8px">PUNK</span></div>'}
  ]
},
// ========== 第2章 布局与结构 ==========
{
  id:"layout",title:"布局与结构",num:"02",
  desc:"定义页面骨架与空间分配，决定信息的组织方式。",
  terms:[
    {name:"响应式布局",en:"Responsive Layout",desc:"根据屏幕宽度自动调整布局。通过媒体查询（Media Query）在不同断点切换排列方式。",
     demo:'<div style="display:flex;gap:8px;align-items:end"><div style="width:30px;height:60px;background:var(--accent);opacity:.7;border-radius:3px;font-size:9px;color:#fff;display:flex;align-items:end;justify-content:center;padding:2px">M</div><div style="width:50px;height:60px;background:var(--accent);opacity:.8;border-radius:3px;font-size:9px;color:#fff;display:flex;align-items:end;justify-content:center;padding:2px">Tablet</div><div style="width:80px;height:60px;background:var(--accent);border-radius:3px;font-size:9px;color:#fff;display:flex;align-items:end;justify-content:center;padding:2px">Desktop</div></div>'},
    {name:"栅格布局",en:"Grid Layout",desc:"将页面划分为等宽列（常见 12/24 列），内容放置在列中。水槽（Gutter）为列间距。",
     demo:'<div class="layout-box" style="width:100%">'+Array.from({length:12},(_,i)=>'<div class="layout-col" style="flex:1;opacity:'+(i%2?.5:.7)+'"></div>').join("")+'</div><div style="font-size:10px;color:var(--sub);margin-top:6px">12 列栅格 · 8px 基础单位</div>'},
    {name:"卡片式布局",en:"Card Layout",desc:"以卡片为基本单元组织内容，每张卡片是独立的信息容器。适合内容聚合类产品。",
     demo:'<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;max-width:240px"><div style="background:var(--tag-bg);border-radius:6px;height:56px"></div><div style="background:var(--tag-bg);border-radius:6px;height:72px"></div><div style="background:var(--tag-bg);border-radius:6px;height:64px"></div><div style="background:var(--tag-bg);border-radius:6px;height:52px"></div></div>'},
    {name:"侧边栏布局",en:"Sidebar Layout",desc:"左侧固定导航 + 右侧内容区。后台管理系统最常见的布局模式。",
     demo:'<div class="layout-sidebar-demo"><div class="side"></div><div class="content"></div></div>'},
    {name:"瀑布流布局",en:"Masonry / Waterfall",desc:"不等高卡片按列排列，像瀑布般错落有致。Pinterest、小红书典型布局。",
     demo:'<div style="display:flex;gap:6px;max-width:200px"><div style="display:flex;flex-direction:column;gap:6px;flex:1"><div style="background:var(--tag-bg);border-radius:4px;height:60px"></div><div style="background:var(--tag-bg);border-radius:4px;height:40px"></div></div><div style="display:flex;flex-direction:column;gap:6px;flex:1"><div style="background:var(--tag-bg);border-radius:4px;height:40px"></div><div style="background:var(--tag-bg);border-radius:4px;height:64px"></div></div></div>'},
    {name:"8px 栅格",en:"8px Grid",desc:"所有间距、尺寸以 8px 为基准倍数（8/16/24/32/48...）。确保视觉对齐与一致性。",
     demo:'<div class="demo-row">'+[8,16,24,32,48].map(v=>'<div class="demo-col"><div style="width:'+v+'px;height:'+v+'px;background:var(--accent);opacity:.6;border-radius:3px"></div><div class="demo-text">'+v+'px</div></div>').join("")+'</div>'},
    {name:"吸顶布局",en:"Sticky Header",desc:"导航栏固定在视口顶部，滚动时始终可见。提升导航效率。",
     demo:'<div style="border:1px solid var(--border);border-radius:6px;height:80px;overflow:hidden;width:180px"><div style="background:var(--accent);height:24px;display:flex;align-items:center;justify-content:center;font-size:9px;color:#fff;position:sticky;top:0">Sticky NavBar</div><div style="padding:6px;font-size:9px;color:var(--sub);line-height:1.8">内容区域<br>滚动时导航固定<br>始终可见<br>提升效率</div></div>'}
  ]
},
// ========== 第3章 标准UI组件 ==========
{
  id:"components",title:"标准 UI 组件",num:"03",
  desc:"行业通用的组件命名与形态，AI 最容易识别和生成的标准化组件。",
  terms:[
    {name:"主按钮",en:"Primary Button",desc:"页面最重要的行动召唤（CTA）。使用主色填充，视觉权重最高。",
     demo:'<div class="demo-row"><button class="demo-btn primary">主要操作</button><button class="demo-btn secondary">次要操作</button><button class="demo-btn text">文字按钮</button><button class="demo-btn primary" disabled>禁用</button></div>'},
    {name:"输入框",en:"Input",desc:"用户输入文本信息的基础组件。包含默认、聚焦、错误、禁用等状态。",
     demo:'<div class="demo-row"><input class="demo-input" placeholder="默认状态" /><input class="demo-input" value="聚焦状态" style="border-color:var(--accent)" /><input class="demo-input" value="错误状态" style="border-color:#e74c3c" /></div>'},
    {name:"开关",en:"Switch / Toggle",desc:"在两种状态间切换（开/关、是/否）。提供即时反馈。",

// === 渲染 ===
function render(){
  const nav=document.getElementById("navList");
  const ct=document.getElementById("content");
  let navH="",ctH="";
  DATA.forEach(sec=>{
    navH+='<div class="nav-group"><div class="nav-group-title" style="cursor:pointer" onclick="navScrollTo(\'sec-'+sec.id+'\')">'+sec.num+' '+sec.title+'</div>';
    sec.terms.forEach((t,i)=>{
      navH+='<div class="nav-item" data-target="'+sec.id+"-"+i+'" onclick="navScrollTo(\''+sec.id+"-"+i+'\')">'+t.name+'</div>';
    });
    navH+="</div>";
    ctH+='<div class="section" id="sec-'+sec.id+'"><div class="section-head"><h3><span class="num">'+sec.num+'</span>'+sec.title+'</h3><p>'+sec.desc+'</p></div><div class="term-grid">';
    sec.terms.forEach((t,i)=>{
      ctH+='<div class="term-card" id="'+sec.id+"-"+i+'"><div class="term-header" onclick="toggleCard(this)"><h4>'+t.name+' <span class="en">'+t.en+'</span></h4><span class="arrow">&#9654;</span></div><div class="term-body"><div class="term-desc">'+t.desc+'</div><div class="demo-box"><span class="demo-label">DEMO</span>'+t.demo+'</div></div></div>';
    });
    ctH+="</div></div>";
  });
  nav.innerHTML=navH;
  ct.innerHTML=ctH;
}
function toggleCard(el){el.parentElement.classList.toggle("open")}

// 点击导航跳转到对应术语卡片（避免覆盖原生 scrollTo）
function navScrollTo(id){
  const el=document.getElementById(id);
  if(!el) return;
  // 确保卡片展开
  el.classList.add("open");
  // 计算滚动位置，减去顶部导航栏高度 + 额外间距
  const top=el.getBoundingClientRect().top+window.pageYOffset-72;
  window.scrollTo({top:top,behavior:"smooth"});
  // 高亮闪烁提示
  el.style.boxShadow="0 0 0 2px var(--accent)";
  setTimeout(()=>{el.style.boxShadow=""},1200);
}

function filterTerms(v){
  const q=v.toLowerCase();
  document.querySelectorAll(".term-card").forEach(c=>{
    const t=c.textContent.toLowerCase();
    c.style.display=t.includes(q)?"":"none";
  });
  document.querySelectorAll(".nav-item").forEach(n=>{
    const t=n.textContent.toLowerCase();
    n.style.display=t.includes(q)?"":"none";
  });
  // 搜索时也过滤章节标题
  document.querySelectorAll(".nav-group").forEach(g=>{
    const visible=g.querySelectorAll(".nav-item[style=''],.nav-item:not([style])");
    g.style.display=visible.length?"":"none";
  });
}

// 滚动时高亮左侧导航 + 侧边栏自动跟随
let ticking=false;
window.addEventListener("scroll",function(){
  if(!ticking){
    window.requestAnimationFrame(function(){
      const cards=document.querySelectorAll(".term-card");
      let currentId="";
      // 找到当前视口中最靠近顶部的卡片
      for(let i=0;i<cards.length;i++){
        const rect=cards[i].getBoundingClientRect();
        if(rect.top<=120) currentId=cards[i].id;
      }
      // 更新导航高亮
      const navItems=document.querySelectorAll(".nav-item");
      navItems.forEach(n=>{
        const isActive=n.getAttribute("data-target")===currentId;
        n.classList.toggle("active",isActive);
        // 让侧边栏滚动到当前活跃项可见
        if(isActive){
          const sidebar=document.getElementById("sidebar");
          const navRect=n.getBoundingClientRect();
          const sideRect=sidebar.getBoundingClientRect();
          if(navRect.top<sideRect.top+60||navRect.bottom>sideRect.bottom-20){
            n.scrollIntoView({block:"center",behavior:"smooth"});
          }
        }
      });
      ticking=false;
    });
    ticking=true;
  }
});

render();
// 默认展开所有卡片
document.querySelectorAll(".term-card").forEach(c=>c.classList.add("open"));
</script>
