<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Ori's Financial Literacy Dictionary</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#f8f7f4;--card:#fff;--text:#1a1a1a;--sub:#666;--border:#e8e5e0;--accent:#c45c3e;--accent2:#2d6a4f;--tag-bg:#f0ede8;--hover:#faf8f5;--shadow:0 1px 3px rgba(0,0,0,.06);--code-bg:#f5f3ef;--nav-bg:rgba(248,247,244,.92);--up:#c62828;--down:#2e7d32}
[data-theme="dark"]{--bg:#141413;--card:#1e1e1c;--text:#e8e5e0;--sub:#999;--border:#2e2e2a;--accent:#e07a5f;--accent2:#52b788;--tag-bg:#2a2a26;--hover:#252522;--shadow:0 1px 3px rgba(0,0,0,.3);--code-bg:#252522;--nav-bg:rgba(20,20,19,.92);--up:#ef5350;--down:#66bb6a}
body{font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Helvetica Neue","Noto Sans SC",sans-serif;background:var(--bg);color:var(--text);line-height:1.7;transition:background .3s,color .3s}
a{color:var(--accent);text-decoration:none}
.top-bar{position:fixed;top:0;left:0;right:0;z-index:100;background:var(--nav-bg);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);height:56px;display:flex;align-items:center;padding:0 24px;justify-content:space-between}
.top-bar h1{font-size:15px;font-weight:600;letter-spacing:.5px;display:flex;align-items:center;gap:8px}
.top-bar h1 .logo-icon{width:20px;height:20px;stroke:var(--accent);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.theme-btn{width:36px;height:36px;border-radius:8px;border:1px solid var(--border);background:var(--card);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s}
.theme-btn:hover{border-color:var(--accent)}
.theme-btn svg{width:18px;height:18px;stroke:var(--text);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.sidebar{position:fixed;top:56px;left:0;bottom:0;width:240px;background:var(--card);border-right:1px solid var(--border);overflow-y:auto;padding:16px 0;z-index:50}
.sidebar::-webkit-scrollbar{width:3px}.sidebar::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
.nav-group{margin-bottom:8px}
.nav-group-title{padding:8px 20px;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:1.5px;color:var(--sub);cursor:pointer}
.nav-group-title:hover{color:var(--accent)}
.nav-item{display:block;padding:7px 20px 7px 28px;font-size:13px;color:var(--sub);cursor:pointer;transition:all .15s;border-left:2px solid transparent}
.nav-item:hover{color:var(--text);background:var(--hover)}
.nav-item.active{color:var(--accent);border-left-color:var(--accent);background:var(--hover);font-weight:500}
.main{margin-left:240px;padding:80px 48px 80px;max-width:960px}
.hero{margin-bottom:56px;padding-bottom:40px;border-bottom:1px solid var(--border)}
.hero h2{font-size:32px;font-weight:700;line-height:1.3;margin-bottom:12px}
.hero p{font-size:15px;color:var(--sub);max-width:600px;line-height:1.8}
.hero .tag-row{display:flex;gap:8px;margin-top:16px;flex-wrap:wrap}
.hero .tag{font-size:11px;padding:4px 10px;border-radius:4px;background:var(--tag-bg);color:var(--sub);font-weight:500}
.section{margin-bottom:64px}.section-head{margin-bottom:32px}
.section-head h3{font-size:22px;font-weight:700;margin-bottom:6px;display:flex;align-items:center;gap:10px}
.section-head h3 .num{font-size:13px;color:var(--accent);font-weight:600;min-width:24px}
.section-head h3 .sec-icon{width:22px;height:22px;stroke:var(--accent);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.section-head p{font-size:13px;color:var(--sub)}
.term-grid{display:grid;grid-template-columns:1fr;gap:16px}
.term-card{background:var(--card);border:1px solid var(--border);border-radius:10px;overflow:hidden;transition:all .2s}
.term-card:hover{box-shadow:var(--shadow);border-color:var(--accent)}
.term-header{padding:16px 20px;cursor:pointer;display:flex;align-items:center;justify-content:space-between}
.term-header h4{font-size:15px;font-weight:600;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.term-header h4 .en{font-size:12px;color:var(--sub);font-weight:400}
.term-header .arrow{font-size:12px;color:var(--sub);transition:transform .2s;display:flex}
.term-header .arrow svg{width:12px;height:12px;stroke:var(--sub);fill:none;stroke-width:2}
.term-card.open .arrow svg{transform:rotate(90deg)}
.term-body{display:none;padding:0 20px 20px;animation:fadeIn .25s}
.term-card.open .term-body{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:none}}
.term-desc{font-size:13px;color:var(--sub);margin-bottom:16px;line-height:1.8}
.demo-box{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:20px;position:relative;overflow:hidden}
.demo-label{position:absolute;top:8px;right:10px;font-size:10px;color:var(--sub);letter-spacing:.5px;font-weight:500}
.callout{border-left:3px solid var(--accent);background:var(--tag-bg);border-radius:0 6px 6px 0;padding:12px 16px;font-size:13px;color:var(--sub);line-height:1.8;margin-bottom:12px}
.callout b,.callout strong{color:var(--text);font-weight:600}
.callout.green{border-left-color:var(--accent2)}.callout.amber{border-left-color:#d97706}.callout.red{border-left-color:#dc2626}
.cmp-table{width:100%;border-collapse:collapse;font-size:13px;margin-top:12px}
.cmp-table th{text-align:left;padding:8px 12px;background:var(--tag-bg);font-weight:600;font-size:12px;border-bottom:2px solid var(--border)}
.cmp-table td{padding:8px 12px;border-bottom:1px solid var(--border)}
.cmp-table tr:last-child td{border-bottom:none}
.cmp-table .good{color:var(--accent2);font-weight:500}.cmp-table .bad{color:#dc2626;font-weight:500}
.val-up{color:var(--up);font-weight:600}.val-down{color:var(--down);font-weight:600}
.code-block{background:var(--code-bg);border-radius:6px;padding:12px 16px;font-family:"SF Mono",Menlo,monospace;font-size:12px;color:var(--sub);overflow-x:auto;margin-top:12px;line-height:1.7;white-space:pre-wrap}
.code-block .hl{color:var(--accent);font-weight:600}
.dtag{display:inline-block;padding:3px 10px;border-radius:4px;font-size:11px;font-weight:500}
.dtag.green{background:#ecfdf5;color:#065f46}.dtag.amber{background:#fefce8;color:#854d0e}.dtag.red{background:#fef2f2;color:#991b1b}.dtag.blue{background:#eff6ff;color:#1e40af}
[data-theme="dark"] .dtag.green{background:#052e16;color:#86efac}[data-theme="dark"] .dtag.amber{background:#422006;color:#fde68a}[data-theme="dark"] .dtag.red{background:#450a0a;color:#fca5a5}[data-theme="dark"] .dtag.blue{background:#172554;color:#93c5fd}
.search-wrap{padding:0 20px;margin-bottom:12px}
.search-input{width:100%;padding:8px 12px;border-radius:6px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-size:13px;outline:none}
.search-input:focus{border-color:var(--accent)}
.lock-screen{position:fixed;inset:0;z-index:9999;background:var(--bg);display:flex;align-items:center;justify-content:center;flex-direction:column;transition:opacity .4s}
.lock-screen.hidden{opacity:0;pointer-events:none}
.lock-icon{width:64px;height:64px;margin-bottom:24px;border-radius:50%;background:var(--tag-bg);display:flex;align-items:center;justify-content:center}
.lock-icon svg{width:28px;height:28px;stroke:var(--accent);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.lock-title{font-size:20px;font-weight:700;margin-bottom:6px;color:var(--text)}
.lock-sub{font-size:13px;color:var(--sub);margin-bottom:24px}
.lock-form{display:flex;gap:8px;align-items:center}
.lock-input{padding:10px 16px;border-radius:8px;border:1px solid var(--border);background:var(--card);color:var(--text);font-size:15px;width:160px;outline:none;text-align:center;letter-spacing:4px;transition:border .2s}
.lock-input:focus{border-color:var(--accent)}.lock-input.shake{animation:shake .4s}
.lock-btn{padding:10px 20px;border-radius:8px;border:none;background:var(--accent);color:#fff;font-size:14px;font-weight:600;cursor:pointer;transition:background .2s}
.lock-btn:hover{opacity:.9}
.lock-error{font-size:12px;color:#c62828;margin-top:10px;min-height:18px}
@keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-8px)}40%,80%{transform:translateX(8px)}}
.back-top{position:fixed;bottom:32px;right:32px;width:40px;height:40px;border-radius:10px;background:var(--card);border:1px solid var(--border);cursor:pointer;display:none;align-items:center;justify-content:center;z-index:80;transition:all .2s;box-shadow:var(--shadow)}
.back-top:hover{border-color:var(--accent)}.back-top svg{width:18px;height:18px;stroke:var(--sub);fill:none;stroke-width:2}.back-top.show{display:flex}
.stars{display:inline-flex;gap:1px;margin-left:8px;vertical-align:middle}
.stars .star{width:14px;height:14px;fill:var(--accent);opacity:.25}.stars .star.active{opacity:1}
.book-refs{margin-top:16px;padding-top:14px;border-top:1px solid var(--border)}
.book-refs-title{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:var(--sub);margin-bottom:8px;display:flex;align-items:center;gap:6px}
.book-refs-title svg{width:14px;height:14px;stroke:var(--accent);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.book-ref{display:flex;align-items:flex-start;gap:10px;padding:8px 12px;border-radius:6px;background:var(--tag-bg);margin-bottom:6px;font-size:12px;line-height:1.6;transition:all .15s}
.book-ref:hover{background:var(--hover)}.book-ref a{color:var(--accent);font-weight:500}.book-ref a:hover{text-decoration:underline}
.book-ref .book-icon{width:16px;height:16px;stroke:var(--accent2);fill:none;stroke-width:2;flex-shrink:0;margin-top:2px}
.book-ref .book-meta{color:var(--sub)}.book-ref .book-quote{font-style:italic;color:var(--sub);margin-top:4px;font-size:11px}
.diagram{margin-bottom:16px;padding:16px;background:var(--tag-bg);border-radius:10px;overflow-x:auto}
.diagram .dlbl{font-size:10px;color:var(--sub);text-align:center;margin-top:8px;letter-spacing:.5px}
.quotes-box{margin-bottom:16px;position:relative;padding-left:28px}
.quotes-box .quotes-icon{position:absolute;left:0;top:10px;width:20px;height:20px;color:var(--accent);opacity:.5}
.quotes-box .quote-line{padding:10px 14px;border-radius:8px;background:linear-gradient(135deg,var(--tag-bg) 0%,transparent 100%);border-left:3px solid var(--accent);margin-bottom:6px;font-size:13px;font-weight:500;color:var(--text);line-height:1.7;letter-spacing:.3px;transition:all .2s}
.quotes-box .quote-line:hover{transform:translateX(4px);border-left-color:var(--accent2)}
.term-updated{display:inline-flex;align-items:center;gap:4px;font-size:11px;color:var(--sub);margin-left:12px}
.term-updated svg{width:12px;height:12px}
.nav-new{display:inline-block;font-size:8px;font-weight:700;color:#fff;background:#dc2626;padding:1px 4px;border-radius:3px;margin-left:4px;vertical-align:middle;line-height:1.4;letter-spacing:.5px}
@media(max-width:768px){.sidebar{display:none}.main{margin-left:0;padding:72px 20px 60px}.hero h2{font-size:24px}}
</style>
</head>
<body>

<div class="lock-screen" id="lockScreen">
<div class="lock-icon"><svg viewBox="0 0 24 24"><line x1="12" y1="1" x2="12" y2="23"/><line x1="17" y1="5" x2="7" y2="19"/><line x1="7" y1="5" x2="17" y2="19"/></svg></div>
<div class="lock-title">Ori's Financial Literacy Dictionary</div>
<div class="lock-sub">请输入访问密码</div>
<div class="lock-form">
<input class="lock-input" id="lockInput" type="password" maxlength="10" placeholder="····" autofocus/>
<button class="lock-btn" onclick="tryUnlock()">进入</button>
</div>
<div class="lock-error" id="lockError"></div>
</div>
<div id="appShell" style="display:none">
<div class="top-bar">
<h1><svg class="logo-icon" viewBox="0 0 24 24"><line x1="12" y1="1" x2="12" y2="23"/><line x1="17" y1="5" x2="7" y2="19"/><line x1="7" y1="5" x2="17" y2="19"/></svg>Ori's Financial Literacy Dictionary</h1>
<button class="theme-btn" onclick="toggleTheme()" id="themeBtn"><svg viewBox="0 0 24 24" id="themeSvg"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg></button>
</div>
<aside class="sidebar" id="sidebar">
<div class="search-wrap"><input class="search-input" placeholder="搜索理财术语..." oninput="filterTerms(this.value)"/></div>
<div id="navList"></div>
</aside>
<main class="main" id="mainContent">
<div class="hero">
<h2>Ori's Financial Literacy Dictionary</h2>
<p>个人理财知识体系构建专用 — 涵盖投资哲学、资产配置、基金实务、估值指标、风控框架、宏观周期、行为金融七大领域，每个概念配实战案例与量化模型。</p>
<div class="tag-row">
<span class="tag">7 大章节</span><span class="tag">48 核心概念</span><span class="tag">涨红跌绿</span><span class="tag">实战案例</span><span class="tag">量化模型</span><span class="tag">经典书籍引用</span><span class="tag">星级评分</span><span class="tag">记忆金句</span><span class="tag">深色模式</span>
</div>
</div>
<div id="content"></div>
</main>
<div class="back-top" id="backTop" onclick="window.scrollTo({top:0,behavior:'smooth'})"><svg viewBox="0 0 24 24"><polyline points="18 15 12 9 6 15"/></svg></div>
</div>

<script>
const PASS_HASH='1109';
function tryUnlock(){var v=document.getElementById('lockInput').value;if(v===PASS_HASH){sessionStorage.setItem('fl_unlocked','1');showApp()}else{var inp=document.getElementById('lockInput');inp.classList.remove('shake');void inp.offsetWidth;inp.classList.add('shake');document.getElementById('lockError').textContent='密码错误，请重试';inp.value='';inp.focus()}}
function showApp(){var lock=document.getElementById('lockScreen');lock.classList.add('hidden');setTimeout(function(){lock.style.display='none'},400);document.getElementById('appShell').style.display=''}
document.getElementById('lockInput').addEventListener('keydown',function(e){if(e.key==='Enter')tryUnlock()});
if(sessionStorage.getItem('fl_unlocked')==='1')showApp();

function toggleTheme(){var d=document.documentElement;var t=d.getAttribute("data-theme")==="dark"?"light":"dark";d.setAttribute("data-theme",t);document.getElementById("themeSvg").innerHTML=t==="dark"?'<circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>':'<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>';localStorage.setItem("fl_theme",t)}
(function(){var t=localStorage.getItem("fl_theme")||"light";document.documentElement.setAttribute("data-theme",t);if(t==="dark"){document.getElementById("themeSvg").innerHTML='<circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>'}})();

window.addEventListener('scroll',function(){document.getElementById('backTop').classList.toggle('show',window.scrollY>400)});

const DATA=[
// ===== CH01 投资哲学与认知 =====
{id:"philosophy",title:"投资哲学与认知",num:"01",
icon:'<svg class="sec-icon" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>',
desc:"投资的第一课不是选什么，而是理解自己的偏见、风险和人性弱点。",
terms:[
{name:"复利效应",en:"Compound Interest",stars:5,updated:"2026-04-15",books:[{title:"穷查理宝典",author:"查理·芒格",url:"https://weread.qq.com/web/bookDetail/2e0320e05cc92c2e0796c5a",quote:"复利是世界第八大奇迹"}],quotes:["雪球不是关键，关键是你要找到一条足够长的山坡。","年化15%，5年翻倍；年化20%，4年翻倍。时间是最强的杠杆。"],desc:"爱因斯坦称之为「世界第八大奇迹」。<strong>利息产生利息</strong>，时间越长效果越惊人。10万元年化15%，10年后变40.5万，20年后变163.7万。复利的敌人是频繁交易和高费率。",demo:'<div class="callout"><strong>复利公式：</strong>FV = PV × (1 + r)^n</div><table class="cmp-table"><tr><th>初始本金</th><th>年化收益</th><th>10年后</th><th>20年后</th><th>30年后</th></tr><tr><td>10万</td><td>10%</td><td>25.9万</td><td>67.3万</td><td>174.5万</td></tr><tr><td>10万</td><td>15%</td><td class="val-up">40.5万</td><td class="val-up">163.7万</td><td class="val-up">662.1万</td></tr><tr><td>10万</td><td>20%</td><td class="val-up">61.9万</td><td class="val-up">383.4万</td><td class="val-up">2373.8万</td></tr></table><div class="callout green" style="margin-top:12px"><strong>关键洞察：</strong>15%和20%看起来只差5个百分点，但30年后差了3.6倍。<strong>选对赛道比单次择时重要100倍。</strong></div>'},
{name:"损失厌恶",en:"Loss Aversion",stars:5,updated:"2026-04-15",books:[{title:"思考，快与慢",author:"丹尼尔·卡尼曼",url:"https://weread.qq.com/web/reader/af83263058c217af81f8979",quote:"损失带来的痛苦大约是等量收益带来的快乐的两倍"}],quotes:["亏1万的痛苦 = 赚2.5万的快乐。这就是你总在最低点割肉的原因。","市场不是在惩罚你，是你的杏仁核在惩罚你。"],desc:"Kahneman & Tversky 前景理论的核心发现：<strong>人对损失的敏感度约为收益的2-2.5倍</strong>。这解释了为什么散户总是「赚小亏大」——赚了急着落袋为安，亏了死扛不肯止损。",demo:'<table class="cmp-table"><tr><th>场景</th><th>理性决策</th><th>损失厌恶下的行为</th></tr><tr><td>持仓盈利20%</td><td class="good">评估基本面是否支持继续持有</td><td class="bad">立刻卖出「落袋为安」</td></tr><tr><td>持仓亏损20%</td><td class="good">评估是否该止损</td><td class="bad">死扛不卖「回本再走」</td></tr><tr><td>大盘暴跌</td><td class="good">检查持仓质量</td><td class="bad">恐慌清仓</td></tr></table><div class="callout amber" style="margin-top:12px"><strong>应对策略：</strong>用规则替代情绪——提前设定止盈止损线，触发即执行，不做盘中决策。</div>'},
{name:"均值回归",en:"Mean Reversion",stars:4,updated:"2026-04-15",quotes:["树不会长到天上去，但也不会扎根到地心。","极端终将回归平均——问题是你能不能扛到那一天。"],desc:"资产价格长期围绕<strong>内在价值</strong>上下波动。暴涨之后大概率回调，暴跌之后大概率修复。但均值回归不告诉你「什么时候」回归——可能是1个月，也可能是3年。",demo:'<table class="cmp-table"><tr><th>场景</th><th>信号</th><th>动作</th></tr><tr><td>行业PE远高于历史均值</td><td>偏离1.5个标准差以上</td><td>减仓/不追高</td></tr><tr><td>优质基金连续3年跑输</td><td>管理能力未变，风格不在风口</td><td>可能是买入机会</td></tr><tr><td>某赛道连续暴涨2年</td><td>资金过度拥挤</td><td>逐步止盈</td></tr></table><div class="callout red" style="margin-top:12px"><strong>陷阱：</strong>均值回归有个前提——「均值」本身没变。如果基本面恶化，股价跌了就是跌了，不会回归。</div>'},
{name:"锚定效应",en:"Anchoring Bias",stars:4,updated:"2026-04-15",quotes:["你的成本价不是市场的锚，市场根本不知道你几块钱买的。","买入价是你的心理账户，不是资产的真实价值。"],desc:"人类决策严重依赖<strong>第一个接收到的数字</strong>作为参考点。在投资中，最常见的锚是「买入成本价」。",demo:'<table class="cmp-table"><tr><th style="width:50%">锚定思维（错误）</th><th>去锚化思维（正确）</th></tr><tr><td class="bad">「我30块买的，等回到30再卖」</td><td class="good">「以当前价格，值不值得买入？不值得买入就不值得持有」</td></tr><tr><td class="bad">「净值从2块跌到1.5，太便宜了」</td><td class="good">「净值高低不代表贵贱，要看持仓估值水平」</td></tr></table><div class="callout green" style="margin-top:12px"><strong>破解方法：</strong>每周问自己——「如果我现在空仓，会不会以当前价格买入这些持仓？」如果不会，就该卖。</div>'},
{name:"安全边际",en:"Margin of Safety",stars:5,updated:"2026-04-15",books:[{title:"聪明的投资者",author:"本杰明·格雷厄姆",url:"https://weread.qq.com/web/bookDetail/98e32df05db0ab98e72ce07",quote:"投资的秘诀可以精炼为四个字：安全边际"}],quotes:["用7折的价格买1块钱的东西——即使算错了也不会亏太多。","安全边际不是为了赚更多，是为了在你犯错时不至于破产。"],desc:"格雷厄姆价值投资的基石。<strong>以显著低于内在价值的价格买入</strong>，给自己留出犯错空间。",demo:'<div class="diagram"><div style="display:flex;align-items:center;justify-content:center;gap:12px;flex-wrap:wrap"><div style="padding:12px 16px;border-radius:8px;background:var(--accent2);color:#fff;font-size:11px;text-align:center;font-weight:600">内在价值<br><span style="font-size:14px">10.00</span></div><div style="font-size:16px;color:var(--sub)">→</div><div style="padding:12px 16px;border-radius:8px;background:#d97706;color:#fff;font-size:11px;text-align:center;font-weight:600">安全边际<br><span style="font-size:14px">30%</span></div><div style="font-size:16px;color:var(--sub)">→</div><div style="padding:12px 16px;border-radius:8px;background:var(--accent);color:#fff;font-size:11px;text-align:center;font-weight:600">买入价≤7.00<br><span style="font-size:9px;opacity:.8">即使算错20%也不亏</span></div></div><div class="dlbl">留出犯错空间 · 这是价值投资的安全带</div></div>'},
{name:"沉没成本谬误",en:"Sunk Cost Fallacy",stars:4,updated:"2026-04-15",quotes:["已经亏的钱回不来了，但你可以阻止未来继续亏。","「都已经投了这么多了」是最贵的一句话。"],desc:"已经付出且<strong>不可回收</strong>的成本不应影响未来决策。但投资者常因为「已经亏了20%」而拒绝止损。",demo:'<table class="cmp-table"><tr><th>思维模式</th><th>内心独白</th><th>结果</th></tr><tr><td class="bad">沉没成本思维</td><td>「都亏了3万了，不能卖」</td><td>从亏3万变成亏8万</td></tr><tr><td class="good">机会成本思维</td><td>「这笔钱放别的标的上半年能回多少？」</td><td>止损换仓，3个月回血</td></tr></table><div class="callout amber" style="margin-top:12px"><strong>检验：</strong>「如果我没有这个持仓，会不会以当前价格买入？」答案是否就该卖，不管成本价。</div>'}
]},

{name:"从众效应",en:"Herd Behavior",stars:4,updated:"2026-04-15",quotes:["当出租车司机都在聊股票的时候，就是该离场的时候。","群体的智慧？在投资市场里，群体只有疯狂。"],desc:"当所有人都在买入时你觉得「不买就亏了」，这不是理性判断，是<strong>社会压力</strong>。凯恩斯说投资是「选美博弈」——你不是选最美的，是选大多数人觉得最美的。",demo:'<table class="cmp-table"><tr><th>市场情绪</th><th>从众行为</th><th>逆向策略</th></tr><tr><td>全民炒股/基金上热搜</td><td class="bad">跟风追高</td><td class="good">分批止盈</td></tr><tr><td>媒体唱衰/基金赎回潮</td><td class="bad">恐慌赎回</td><td class="good">分批建仓</td></tr><tr><td>某行业人人看好</td><td class="bad">重仓单一赛道</td><td class="good">保持分散</td></tr></table><div class="callout amber" style="margin-top:12px"><strong>巴菲特法则：</strong>「在别人贪婪时恐惧，在别人恐惧时贪婪。」说起来容易，做起来需要纪律。</div>'},
{name:"过度自信",en:"Overconfidence Bias",stars:4,updated:"2026-04-15",quotes:["90%的司机认为自己开车水平高于平均——投资者也一样。","赚钱了归功于自己的才华，亏钱了怪市场不好——这叫自我归因偏差。"],desc:"大多数投资者高估自己的选股能力和择时能力。赚钱时归因于能力（其实可能是牛市），亏钱时归因于运气。过度自信导致<strong>交易频率过高</strong>、<strong>仓位过于集中</strong>。",demo:'<table class="cmp-table"><tr><th style="width:50%">过度自信的表现</th><th>后果</th></tr><tr><td class="bad">「这次绝对能抄底」→ 重仓抄底</td><td>底部还有十八层地下室</td></tr><tr><td class="bad">「我看准了趋势」→ 频繁交易</td><td>手续费+滑点吃掉大部分收益</td></tr><tr><td class="bad">「这只股票我研究透了」→ 单一重仓</td><td>黑天鹅一来损失惨重</td></tr></table><div class="callout green" style="margin-top:12px"><strong>解药：</strong>记投资日记。每笔交易写下理由和预期，3个月后回看——你会发现自己没有想象中那么准。</div>'},
{name:"投资检查清单",en:"Investment Checklist",stars:5,updated:"2026-04-15",quotes:["飞行员靠检查清单保命，投资者也应该。","好的投资系统不依赖灵感，依赖流程。"],desc:"将投资决策<strong>流程化</strong>。每次买入/卖出前必须过一遍清单，避免情绪化操作。这是从航空业借鉴的方法——飞行员不靠记忆，靠清单。",demo:'<div class="code-block"><span class="hl">买入检查清单：</span>\n□ 这个标的的核心逻辑是什么？一句话能说清吗？\n□ PE/PB百分位在历史什么位置？\n□ 买入后如果跌30%，我能承受吗？\n□ 止损线设在哪里？什么条件下卖出？\n□ 仓位占比是否超过20%？\n□ 是否有足够的安全边际？\n\n<span class="hl">卖出检查清单：</span>\n□ 买入时的核心逻辑还成立吗？\n□ 是因为恐惧还是因为逻辑在卖？\n□ 如果现在空仓，会不会以当前价买入？\n□ 是否到了止盈目标位？\n□ 资金是否有更好的去处（机会成本）？</div>'},
{name:"心理账户",en:"Mental Accounting",stars:3,updated:"2026-04-15",quotes:["你赌赢了1000块觉得可以挥霍，自己赚的1000块却舍不得花——钱是一样的。","心理账户让你用不同标准对待同一笔钱。"],desc:"Richard Thaler（诺奖）提出。人会在心里把钱分成不同「账户」，对各账户的风险容忍度不同。「赚来的钱」更敢冒险，「工资」更保守——但钱就是钱，不应区别对待。",demo:'<table class="cmp-table"><tr><th>心理账户</th><th>典型行为</th><th>理性对策</th></tr><tr><td class="bad">「浮盈不算钱」→ 利润部分加大风险</td><td>牛市浮盈追加杠杆</td><td class="good">浮盈=真实资产，同样需要风控</td></tr><tr><td class="bad">「这笔钱反正是多余的」→ 赌博心态</td><td>年终奖/奖金随意投机</td><td class="good">所有钱适用同一套投资纪律</td></tr></table>'},
{name:"定期复盘",en:"Periodic Review",stars:4,updated:"2026-04-15",quotes:["不复盘的投资和赌博没有区别。","月度复盘15分钟，胜过盘中盯盘15天。"],desc:"<strong>每月/每季度</strong>对投资组合做系统性回顾。包括：收益归因（赚在哪/亏在哪）、风险检查（集中度/回撤）、计划调整。",demo:'<div class="callout"><strong>月度复盘模板（15分钟完成）：</strong></div><div class="code-block"><span class="hl">1. 收益检查</span>\n   - 本月总收益率：___% | 基准(沪深300)：___%\n   - 贡献最大的3只持仓：\n   - 拖后腿最大的3只持仓：\n\n<span class="hl">2. 风险检查</span>\n   - 当前最大持仓占比：___%（是否>20%？）\n   - 单一行业最大暴露：___%（是否>40%？）\n   - 现金储备：___%（是否>10%？）\n\n<span class="hl">3. 计划调整</span>\n   - 需要再平衡吗？（偏离目标>5%？）\n   - 有没有该止损但还没止损的持仓？\n   - 下月关注的机会/风险事件：</div>'}
]}
];

// === Updated badge ===
function isNew(t){if(!t.updated)return false;var d=new Date(t.updated),now=new Date();return(now-d)/(1000*60*60*24)<7}
function updatedBadge(t){if(!t.updated)return '';return '<span class="term-updated"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>'+t.updated+'</span>'}
function render(){
var nav=document.getElementById('navList'),ct=document.getElementById('content'),navH='',ctH='';
DATA.forEach(function(sec){sec.terms.sort(function(a,b){return(b.stars||0)-(a.stars||0)});
navH+='<div class="nav-group"><div class="nav-group-title" onclick="navScrollTo(&quot;sec-'+sec.id+'&quot;)">' +sec.num+' '+sec.title+'</div>';
sec.terms.forEach(function(t,i){navH+='<div class="nav-item" data-target="'+sec.id+'-'+i+'" onclick="navScrollTo(&quot;'+sec.id+'-'+i+'&quot;)">' +t.name+(isNew(t)?'<span class="nav-new">NEW</span>':'')+'</div>'});
navH+='</div>';
ctH+='<div class="section" id="sec-'+sec.id+'"><div class="section-head"><h3>'+sec.icon+'<span class="num">'+sec.num+'</span>'+sec.title+'</h3><p>'+sec.desc+'</p></div><div class="term-grid">';
sec.terms.forEach(function(t,i){
var starsH='<span class="stars">';for(var s=0;s<5;s++){starsH+='<svg class="star '+(s<t.stars?'active':'')+'" viewBox="0 0 24 24"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>'}starsH+='</span>';
var booksH='';if(t.books&&t.books.length){booksH='<div class="book-refs"><div class="book-refs-title"><svg viewBox="0 0 24 24"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>经典著作</div>';t.books.forEach(function(b){booksH+='<div class="book-ref"><svg class="book-icon" viewBox="0 0 24 24"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg><div><a href="'+b.url+'" target="_blank" rel="noopener">'+b.title+'</a> <span class="book-meta">— '+b.author+'</span>'+(b.quote?'<div class="book-quote">“'+b.quote+'”</div>':'')+'</div></div>'});booksH+='</div>'}
var quotesH='';if(t.quotes&&t.quotes.length){quotesH='<div class="quotes-box"><svg class="quotes-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>'+t.quotes.map(function(q){return '<div class="quote-line">'+q+'</div>'}).join('')+'</div>'}
ctH+='<div class="term-card" id="'+sec.id+'-'+i+'"><div class="term-header" onclick="toggleCard(this)"><h4>'+t.name+' <span class="en">'+t.en+'</span>'+starsH+updatedBadge(t)+'</h4><span class="arrow"><svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg></span></div><div class="term-body"><div class="term-desc">'+t.desc+'</div>'+quotesH+'<div class="demo-box"><span class="demo-label">EXAMPLE</span>'+t.demo+'</div>'+booksH+'</div></div>'
});
ctH+='</div></div>'});
nav.innerHTML=navH;ct.innerHTML=ctH}
function toggleCard(el){el.parentElement.classList.toggle('open')}
function navScrollTo(id){var el=document.getElementById(id);if(!el)return;el.classList.add('open');var top=el.getBoundingClientRect().top+window.pageYOffset-72;window.scrollTo({top:top,behavior:'smooth'});el.style.boxShadow='0 0 0 2px var(--accent)';setTimeout(function(){el.style.boxShadow=''},1200)}
function filterTerms(v){var q=v.toLowerCase();document.querySelectorAll('.term-card').forEach(function(c){c.style.display=c.textContent.toLowerCase().includes(q)?'':'none'});document.querySelectorAll('.nav-item').forEach(function(n){n.style.display=n.textContent.toLowerCase().includes(q)?'':'none'});document.querySelectorAll('.nav-group').forEach(function(g){var vis=g.querySelectorAll('.nav-item[style=""],.nav-item:not([style])');g.style.display=vis.length?'':'none'})}
var ticking=false;window.addEventListener('scroll',function(){if(!ticking){window.requestAnimationFrame(function(){var cards=document.querySelectorAll('.term-card');var currentId='';for(var i=0;i<cards.length;i++){if(cards[i].getBoundingClientRect().top<=120)currentId=cards[i].id}document.querySelectorAll('.nav-item').forEach(function(n){var isAct=n.getAttribute('data-target')===currentId;n.classList.toggle('active',isAct);if(isAct){var sidebar=document.getElementById('sidebar');var nr=n.getBoundingClientRect();var sr=sidebar.getBoundingClientRect();if(nr.top<sr.top+60||nr.bottom>sr.bottom-20)n.scrollIntoView({block:'center',behavior:'smooth'})}});ticking=false});ticking=true}});
render();
document.querySelectorAll('.term-card').forEach(function(c){c.classList.add('open')});
</script>
</body>
</html>
