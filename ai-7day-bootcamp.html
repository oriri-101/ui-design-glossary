<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>7 天 AI 从业者养成计划</title>
<style>
:root{
  --bg:#FAF8F5; --surface:#FFFFFF; --surface-2:#F5F1EA; --border:#E8E2D8; --border-strong:#D6CDBE;
  --text:#1A1916; --text-2:#5C5650; --text-3:#8A847C; --accent:#C4652A; --accent-soft:#FBE9D6;
  --success:#5B8A4F; --warn:#B8862E; --danger:#C13B3B;
  --radius:10px; --shadow:0 1px 2px rgba(0,0,0,.04),0 4px 12px rgba(0,0,0,.04);
  --font:-apple-system,BlinkMacSystemFont,"SF Pro SC","SF Pro Text","PingFang SC","Microsoft YaHei",sans-serif;
}
[data-theme="dark"]{
  --bg:#16140F; --surface:#1F1C16; --surface-2:#272318; --border:#3A3527; --border-strong:#4D4633;
  --text:#F0EBE0; --text-2:#B5AC9B; --text-3:#7E7766; --accent:#E08850; --accent-soft:#3A2818;
  --success:#7DB070; --warn:#D4A24F; --danger:#E06060;
  --shadow:0 1px 2px rgba(0,0,0,.3),0 4px 12px rgba(0,0,0,.2);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{font-family:var(--font);background:var(--bg);color:var(--text);font-size:15px;line-height:1.75;-webkit-font-smoothing:antialiased}
a{color:inherit;text-decoration:none}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}

/* 顶栏 */
.topbar{position:fixed;top:0;left:0;right:0;height:56px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 24px;z-index:100;backdrop-filter:saturate(180%) blur(8px)}
.brand{display:flex;align-items:center;gap:10px;font-weight:600;font-size:15px}
.brand-mark{width:28px;height:28px;background:var(--accent);color:#fff;border-radius:6px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;letter-spacing:-.5px}
.topbar-spacer{flex:1}
.topbar-actions{display:flex;align-items:center;gap:8px}
.icon-btn{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;color:var(--text-2);transition:all .15s}
.icon-btn:hover{background:var(--surface-2);color:var(--text)}
.icon-btn svg{width:18px;height:18px}

/* 布局 */
.layout{display:flex;padding-top:56px;min-height:100vh}
.sidebar{width:260px;border-right:1px solid var(--border);position:fixed;top:56px;bottom:0;left:0;overflow-y:auto;padding:24px 16px;background:var(--surface)}
.sidebar h3{font-size:11px;color:var(--text-3);text-transform:uppercase;letter-spacing:1px;font-weight:600;padding:0 8px;margin-bottom:12px}
.nav-link{display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:6px;font-size:14px;color:var(--text-2);transition:all .15s;margin-bottom:2px;cursor:pointer}
.nav-link:hover{background:var(--surface-2);color:var(--text)}
.nav-link.active{background:var(--accent-soft);color:var(--accent);font-weight:500}
.nav-num{width:22px;height:22px;border-radius:5px;background:var(--surface-2);color:var(--text-3);font-size:11px;font-weight:600;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.nav-link.active .nav-num{background:var(--accent);color:#fff}
.nav-link.done .nav-num{background:var(--success);color:#fff}
.progress-box{margin-top:24px;padding:14px;background:var(--surface-2);border-radius:8px}
.progress-label{font-size:12px;color:var(--text-3);margin-bottom:8px;display:flex;justify-content:space-between}
.progress-bar{height:6px;background:var(--border);border-radius:3px;overflow:hidden}
.progress-fill{height:100%;background:var(--accent);transition:width .3s;width:0%}
.progress-text{font-size:12px;color:var(--text-2);margin-top:8px}

.main{margin-left:260px;flex:1;padding:32px 48px 80px;max-width:920px}

/* Hero */
.hero{padding:24px 0 32px;border-bottom:1px solid var(--border);margin-bottom:32px}
.hero-tag{display:inline-block;padding:3px 10px;background:var(--accent-soft);color:var(--accent);font-size:11px;font-weight:600;border-radius:4px;letter-spacing:.5px;margin-bottom:12px}
.hero h1{font-size:32px;font-weight:700;letter-spacing:-.5px;line-height:1.2;margin-bottom:12px}
.hero p{color:var(--text-2);font-size:15px;max-width:680px}
.hero-meta{display:flex;gap:24px;margin-top:20px;flex-wrap:wrap}
.hero-meta-item{font-size:13px;color:var(--text-3)}
.hero-meta-item strong{display:block;font-size:18px;color:var(--text);font-weight:600;margin-bottom:2px}

/* Day Section */
.section{margin-bottom:64px;scroll-margin-top:80px}
.day-head{margin-bottom:24px}
.day-tag{display:inline-block;padding:3px 8px;background:var(--accent);color:#fff;font-size:11px;font-weight:600;border-radius:4px;margin-bottom:8px;letter-spacing:.5px}
.day-title{font-size:24px;font-weight:700;letter-spacing:-.3px;margin-bottom:8px}
.day-goal{color:var(--text-2);font-size:14px;margin-bottom:12px}
.chips{display:flex;gap:6px;flex-wrap:wrap}
.chip{padding:3px 8px;background:var(--surface-2);color:var(--text-2);font-size:11px;border-radius:4px;border:1px solid var(--border)}

/* Block */
.block{margin-top:28px}
.block-title{display:flex;align-items:center;gap:8px;font-size:13px;font-weight:600;color:var(--text-3);text-transform:uppercase;letter-spacing:1px;margin-bottom:14px}
.block-title::before{content:"";width:3px;height:14px;background:var(--accent);border-radius:2px}

/* Knowledge Card */
.kn-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px 22px;margin-bottom:14px;transition:all .15s}
.kn-card:hover{border-color:var(--border-strong);box-shadow:var(--shadow)}
.kn-head{display:flex;align-items:flex-start;gap:12px;margin-bottom:10px}
.kn-num{flex-shrink:0;width:24px;height:24px;border-radius:5px;background:var(--accent-soft);color:var(--accent);font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center}
.kn-title{font-size:15px;font-weight:600;line-height:1.4}
.kn-body{color:var(--text-2);font-size:14px;line-height:1.75}
.kn-body p{margin-bottom:8px}
.kn-body ul{margin:8px 0 8px 20px}
.kn-body li{margin-bottom:4px}
.kn-body strong{color:var(--text)}
.kn-body code{padding:1px 6px;background:var(--surface-2);border-radius:4px;font-family:"SF Mono",Menlo,Consolas,monospace;font-size:12.5px;color:var(--accent)}

/* Task */
.task{display:flex;gap:12px;padding:14px 16px;background:var(--surface);border:1px solid var(--border);border-radius:8px;margin-bottom:8px;cursor:pointer;transition:all .15s}
.task:hover{border-color:var(--border-strong)}
.task.done{background:var(--surface-2);opacity:.7}
.task.done .task-text{text-decoration:line-through}
.task-cb{width:18px;height:18px;border:1.5px solid var(--border-strong);border-radius:4px;flex-shrink:0;margin-top:2px;display:flex;align-items:center;justify-content:center;transition:all .15s}
.task.done .task-cb{background:var(--accent);border-color:var(--accent)}
.task.done .task-cb svg{display:block}
.task-cb svg{width:11px;height:11px;color:#fff;display:none}
.task-body{flex:1}
.task-text{font-size:14px;font-weight:500;margin-bottom:4px}
.task-detail{font-size:13px;color:var(--text-2);line-height:1.65;margin-bottom:6px}
.task-est{font-size:11px;color:var(--text-3)}

/* Quiz */
.quiz{background:var(--surface);border:1px solid var(--border);border-left:3px solid var(--warn);border-radius:8px;padding:14px 16px;margin-bottom:10px}
.quiz-q{font-size:14px;font-weight:500;margin-bottom:8px}
.quiz-toggle{font-size:12px;color:var(--accent);cursor:pointer;font-weight:500}
.quiz-a{display:none;margin-top:10px;padding-top:10px;border-top:1px dashed var(--border);font-size:13px;color:var(--text-2);line-height:1.7}
.quiz-a.open{display:block}

/* Resource */
.res-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:10px}
.res{display:block;padding:14px 16px;background:var(--surface);border:1px solid var(--border);border-radius:8px;transition:all .15s}
.res:hover{border-color:var(--accent);box-shadow:var(--shadow)}
.res-title{font-size:14px;font-weight:500;margin-bottom:4px}
.res-meta{font-size:12px;color:var(--text-3)}

/* 响应式 */
@media (max-width:900px){
  .sidebar{display:none}
  .main{margin-left:0;padding:24px 20px 60px}
  .hero h1{font-size:26px}
}
</style>
</head>
<body>

<header class="topbar">
  <div class="brand">
    <div class="brand-mark">AI</div>
    <span>7 天 AI 从业者养成计划</span>
  </div>
  <div class="topbar-spacer"></div>
  <div class="topbar-actions">
    <button class="icon-btn" id="resetBtn" title="重置进度">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 3-6.7L3 8"/><path d="M3 3v5h5"/></svg>
    </button>
    <button class="icon-btn" id="themeBtn" title="切换主题">
      <svg id="iconSun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg>
      <svg id="iconMoon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
    </button>
  </div>
</header>

<div class="layout">
  <aside class="sidebar">
    <h3>学习路径</h3>
    <nav id="nav"></nav>
    <div class="progress-box">
      <div class="progress-label"><span>整体进度</span><span id="progPct">0%</span></div>
      <div class="progress-bar"><div class="progress-fill" id="progFill"></div></div>
      <div class="progress-text" id="progText">完成 0 / 0 项任务</div>
    </div>
  </aside>

  <main class="main">
    <section class="hero">
      <div class="hero-tag">7 DAY BOOTCAMP</div>
      <h1>从零起步，七天搭起你的 AI 实战底座</h1>
      <p>每天 60–90 分钟，知识 + 任务 + 自检三件套。第 7 天结束时，你能独立用 LLM 完成一个真实工作场景，并知道下一步该深入哪个方向。</p>
      <div class="hero-meta">
        <div class="hero-meta-item"><strong>7 天</strong>系统化路径</div>
        <div class="hero-meta-item"><strong>21 个</strong>核心知识点</div>
        <div class="hero-meta-item"><strong>21 个</strong>实操任务</div>
        <div class="hero-meta-item"><strong>21 道</strong>自检题</div>
      </div>
    </section>
    <div id="content"></div>
  </main>
</div>

<script>
const DATA = [
  {
    id:"d1", num:"DAY 1", title:"认知地基：大模型到底是什么",
    goal:"用最朴素的语言搞清楚 LLM 的本质、能做什么、不能做什么。", duration:"60 分钟", level:"入门",
    tags:["概念","原理"],
    knowledge:[
      {t:"LLM 的本质：下一个 token 预测器", b:`<p>大语言模型（LLM）不是\"理解\"，而是<strong>基于海量文本训练出的概率预测机器</strong>——给定一段文字，预测下一个最可能出现的字（token）。</p><p>把这个动作循环几千次，就生成了一段看似有逻辑的文字。理解这一点，你就明白了为什么 LLM 会<strong>一本正经胡说八道（幻觉）</strong>：它在做概率匹配，不在做事实核查。</p>`},
      {t:"三个核心能力 vs 三个根本短板", b:`<p><strong>能做：</strong>语言理解与生成、模式识别与提炼、代码与结构化输出。</p><p><strong>不能做：</strong>实时信息（训练截止后的事不知道）、精确计算（数字推理依赖外挂工具）、事实保真（会编造不存在的人名/论文/链接）。</p><p>清楚边界，才能用对地方。</p>`},
      {t:"主流模型简史与选型直觉", b:`<p>主流玩家：OpenAI（GPT-4o/o1）、Anthropic（Claude 3.5/4）、Google（Gemini）、阿里（Qwen）、DeepSeek、Kimi。</p><p>选型粗略原则：<strong>写作/对话用 Claude，编程用 Claude/GPT，多模态用 GPT-4o/Gemini，性价比用 DeepSeek/Qwen。</strong>不要纠结哪个最好，开始用就行。</p>`}
    ],
    tasks:[
      {x:"注册一个主流 AI 工具账号", d:"推荐 Claude.ai 或 chat.deepseek.com，准备好邮箱即可。已有账号跳过。", e:"10 分钟"},
      {x:"做一次\"幻觉\"实测", d:"问 LLM 一个虚构人物的事迹，比如\"请介绍 2024 年图灵奖得主王小明的主要贡献\"。观察它是否会编造内容。", e:"15 分钟"},
      {x:"用三个不同模型回答同一问题", d:"准备一个你工作中真实遇到的问题，分别问 ChatGPT、Claude、DeepSeek，对比回答风格和质量差异。", e:"30 分钟"}
    ],
    quiz:[
      {q:"为什么 LLM 会出现幻觉？", a:"因为它本质是概率预测器，目标是\"生成最可能的下一个 token\"，而不是\"输出最真实的事实\"。当训练数据里没有相关信息时，它会用概率最高的语言模式拼凑出一个看起来合理但实际不存在的答案。"},
      {q:"哪种场景不适合直接用 LLM？", a:"需要实时数据（如今天股价）、精确数值计算、引用必须真实的法律/医学/学术结论的场景。这些场景需要外挂搜索、计算器、知识库。"},
      {q:"Claude 和 GPT 的最大差异是什么？", a:"风格上 Claude 更克制、长文写作更连贯；GPT 更外向、生态更全（插件/GPTs/语音）。能力差异在缩小，选哪个看你顺手，不用焦虑。"}
    ],
    resources:[
      {t:"3Blue1Brown：神经网络可视化", m:"YouTube 视频系列", u:"https://www.youtube.com/watch?v=aircAruvnKk"},
      {t:"《这就是 ChatGPT》Stephen Wolfram", m:"中文版图书 / 微信读书", u:"https://weread.qq.com/"},
      {t:"OpenAI Cookbook 入门", m:"官方示例库", u:"https://cookbook.openai.com/"}
    ]
  },
  {
    id:"d2", num:"DAY 2", title:"Prompt 工程：从能用到好用",
    goal:"掌握 6 要素 Prompt 框架，让 AI 输出从\"还行\"跳到\"惊艳\"。", duration:"75 分钟", level:"入门",
    tags:["Prompt","实操"],
    knowledge:[
      {t:"6 要素 Prompt 框架", b:`<p>一个高质量 Prompt 包含：<strong>角色 + 任务 + 输入 + 输出格式 + 约束 + 示例</strong>。</p><ul><li><strong>角色</strong>：你是一名资深产品经理</li><li><strong>任务</strong>：评审下面的 PRD</li><li><strong>输入</strong>：[贴入 PRD]</li><li><strong>输出</strong>：按\"优点/风险/建议\"三段输出</li><li><strong>约束</strong>：每段不超过 100 字</li><li><strong>示例</strong>：参考下面这个示范输出</li></ul><p>缺哪个补哪个，质量立刻翻倍。</p>`},
      {t:"Few-shot：用例子教 AI", b:`<p>当任务复杂或风格特殊时，<strong>给 2–3 个示范输入输出对</strong>，比写 500 字说明更有效。</p><p>原理：LLM 是模式匹配器，给它看模式比给它讲规则更直接。比如要写小红书爆款标题，与其描述\"要有数字、要有悬念\"，不如直接贴 3 个真实爆款标题让它学。</p>`},
      {t:"思维链（CoT）：让它\"慢慢想\"", b:`<p>对于推理类任务，加一句 <code>请一步一步思考</code> 或 <code>先列出推理过程，再给结论</code>，准确率能显著提升。</p><p>原因：强制 LLM 把内部推理外显化，相当于多给它\"思考 token\"。这是 OpenAI o1 系列的底层逻辑，但你在普通模型上加这一句也能立竿见影。</p>`}
    ],
    tasks:[
      {x:"用 6 要素重写一个旧 Prompt", d:"找一个之前用 ChatGPT 时效果不好的 Prompt，按角色/任务/输入/输出/约束/示例 6 要素重写，对比效果差异。", e:"20 分钟"},
      {x:"做一次 Few-shot 实验", d:"找 3 个你欣赏的写作样本（如朋友圈文案、推文标题），把它们作为示范贴给 AI，让它按同样风格写新内容。", e:"25 分钟"},
      {x:"对比加 vs 不加 CoT", d:"找一道逻辑/数学题，先不加任何提示让 AI 直接回答，再加\"请一步一步思考\"重新问，对比正确率和思路完整度。", e:"15 分钟"}
    ],
    quiz:[
      {q:"6 要素中最容易被忽略的是哪个？为什么补上它效果最好？", a:"\"输出格式\"和\"示例\"。明确格式（如 Markdown 表格、JSON、三段式）能让 AI 输出可直接使用而不是再二次整理；示例则能让 AI 立刻学会你的风格，比文字描述高效 10 倍。"},
      {q:"什么场景下 Few-shot 比 Zero-shot 更有效？", a:"任务风格特殊、专业领域规则复杂、输出格式严格的场景。如：医疗诊断报告、特定文风创作、结构化数据抽取。给示例 = 给模板。"},
      {q:"思维链（CoT）的核心机制是什么？", a:"通过强制模型外显推理过程，让它使用更多\"思考 token\"，从而提高复杂推理的准确率。本质是用\"慢思考\"替代\"直觉跳答\"。"}
    ],
    resources:[
      {t:"Anthropic Prompt Engineering 官方课", m:"免费交互课程", u:"https://docs.anthropic.com/en/docs/build-with-claude/prompt-engineering/overview"},
      {t:"OpenAI Prompt 最佳实践", m:"官方文档", u:"https://platform.openai.com/docs/guides/prompt-engineering"},
      {t:"Lilian Weng 博客：Prompt Engineering", m:"深度博文", u:"https://lilianweng.github.io/posts/2023-03-15-prompt-engineering/"}
    ]
  },
  {
    id:"d3", num:"DAY 3", title:"RAG：让 AI 用上你的私有知识",
    goal:"理解检索增强生成的全流程，会用现成工具搭一个最小 RAG。", duration:"90 分钟", level:"进阶",
    tags:["RAG","架构"],
    knowledge:[
      {t:"RAG 解决什么问题", b:`<p>LLM 知识截止 + 不能用你的私有数据 = 用不上你的公司文档/笔记/代码库。</p><p><strong>RAG（检索增强生成）</strong>的思路：先把你的文档切片存到向量库，提问时先检索最相关的片段，再把片段 + 问题一起塞给 LLM 让它基于片段回答。</p><p>等于给 LLM 配了一个\"开卷考试\"的资料夹。</p>`},
      {t:"RAG 全流程 8 步", b:`<p><code>Document → Chunk → Embed → Vector DB → Retrieve → Rerank → Prompt → LLM → Answer</code></p><ul><li><strong>Chunk</strong>：把长文档切成 200–500 字的小块</li><li><strong>Embed</strong>：用嵌入模型把文本转成向量</li><li><strong>Vector DB</strong>：存到 Chroma / Pinecone / Milvus</li><li><strong>Retrieve</strong>：用问题向量查最相似的 top-k 片段</li><li><strong>Rerank</strong>：用更重的模型对 top-k 重排序</li><li><strong>Prompt</strong>：把片段拼进系统提示</li></ul>`},
      {t:"开箱即用工具", b:`<p>不想写代码：<strong>NotebookLM</strong>（Google 出品，上传文档直接对话）、<strong>Cherry Studio</strong>（本地知识库 GUI）、<strong>Dify</strong>（开源 LLM 应用平台）。</p><p>想写代码：<strong>LangChain / LlamaIndex</strong>（Python 框架）。</p><p>建议从 NotebookLM 起步，10 分钟搭出一个能问答的私有知识库。</p>`}

function escapeHtml(s){return s.replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c]));}

function totalTasks(){let n=0;DATA.forEach(d=>n+=d.tasks.length);return n;}
function doneTasks(){return Object.values(progress).filter(v=>v).length;}

function renderNav(){
  const html = DATA.map((d,idx)=>{
    const dayDone = d.tasks.every((_,i)=>progress[`${d.id}_t${i}`]);
    return `<a class="nav-link ${dayDone?'done':''}" data-id="${d.id}"><span class="nav-num">${idx+1}</span><span>${escapeHtml(d.title.split("：")[0])}</span></a>`;
  }).join("");
  document.getElementById("nav").innerHTML = html;
  document.querySelectorAll(".nav-link").forEach(a=>{
    a.addEventListener("click",e=>{
      const id = a.getAttribute("data-id");
      const target = document.getElementById(id);
      if(target) target.scrollIntoView({behavior:"smooth",block:"start"});
    });
  });
}

      <a class="res" href="${r.u}" target="_blank" rel="noopener">
        <div class="res-title">${escapeHtml(r.t)}</div>
        <div class="res-meta">${escapeHtml(r.m)}</div>
      </a>`).join("");

    return `
      <section class="section" id="${d.id}">
        <div class="day-head">
          <div class="day-tag">${d.num}</div>
          <h2 class="day-title">${escapeHtml(d.title)}</h2>
          <p class="day-goal">${escapeHtml(d.goal)}</p>
          <div class="chips">
            <span class="chip">时长 ${d.duration}</span>
            <span class="chip">难度 ${d.level}</span>
            ${d.tags.map(t=>`<span class="chip">${escapeHtml(t)}</span>`).join("")}
          </div>
        </div>
        <div class="block"><div class="block-title">核心知识</div>${knHtml}</div>
        <div class="block"><div class="block-title">实操任务</div>${taskHtml}</div>
        <div class="block"><div class="block-title">自检题</div>${quizHtml}</div>
        <div class="block"><div class="block-title">推荐资源</div><div class="res-grid">${resHtml}</div></div>
      </section>`;
  }).join("");
  document.getElementById("content").innerHTML = html;

  // Task click
  document.querySelectorAll(".task").forEach(t=>{
    t.addEventListener("click",()=>{
      const tid = t.getAttribute("data-tid");
      progress[tid] = !progress[tid];
      localStorage.setItem(KEY_PROG, JSON.stringify(progress));
      t.classList.toggle("done", progress[tid]);
      updateProgress();
      renderNav();
    });
  });

  // Quiz toggle
  document.querySelectorAll(".quiz-toggle").forEach(btn=>{
    btn.addEventListener("click",()=>{
      const a = btn.nextElementSibling;
      a.classList.toggle("open");
      btn.textContent = a.classList.contains("open") ? "收起答案" : "查看参考答案";
    });
  });
}

function updateProgress(){
  const done = doneTasks(), total = totalTasks();
  const pct = total ? Math.round(done/total*100) : 0;
  document.getElementById("progPct").textContent = pct + "%";
  document.getElementById("progFill").style.width = pct + "%";
  document.getElementById("progText").textContent = `完成 ${done} / ${total} 项任务`;
}

function setupScrollSpy(){
  const sections = DATA.map(d=>document.getElementById(d.id));
  window.addEventListener("scroll",()=>{
    const y = window.scrollY + 120;
    let active = sections[0];
    sections.forEach(s=>{ if(s && s.offsetTop <= y) active = s; });
    if(active){
      document.querySelectorAll(".nav-link").forEach(n=>n.classList.toggle("active", n.getAttribute("data-id") === active.id));
    }
  });
}

// 主题
function applyTheme(theme){
  document.documentElement.setAttribute("data-theme", theme);
  const sun = document.getElementById("iconSun"), moon = document.getElementById("iconMoon");
  if(sun) sun.style.display = theme==="dark" ? "none" : "block";
  if(moon) moon.style.display = theme==="dark" ? "block" : "none";
  localStorage.setItem(KEY_THEME, theme);
}

function init(){
  try{
    const savedTheme = localStorage.getItem(KEY_THEME) || (window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");
    applyTheme(savedTheme);
    document.getElementById("themeBtn").addEventListener("click",()=>{
      applyTheme(document.documentElement.getAttribute("data-theme")==="dark" ? "light" : "dark");
    });
    document.getElementById("resetBtn").addEventListener("click",()=>{
      if(confirm("确认清除所有任务进度？")){
        progress = {};
        localStorage.removeItem(KEY_PROG);
        renderContent();
        renderNav();
        updateProgress();
      }
    });
    renderNav();
    renderContent();
    updateProgress();
    setupScrollSpy();
    // 默认激活第一个
    const first = document.querySelector(".nav-link");
    if(first) first.classList.add("active");
  }catch(e){
    console.error("[AI Bootcamp] init failed:", e);
    const c = document.getElementById("content");
    if(c) c.innerHTML = `<div style="background:#fee;border:1px solid #faa;padding:16px;border-radius:8px;color:#900;font-family:monospace;font-size:13px"><strong>页面渲染出错</strong><br>${e.message}<br><pre style="white-space:pre-wrap;margin-top:8px">${e.stack||""}</pre></div>`;
  }
}

if(document.readyState === "loading"){
  document.addEventListener("DOMContentLoaded", init);
}else{
  init();
}
</script>
</body>
</html>
